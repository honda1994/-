<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>配達サービスを選ぶ</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Noto Sans JP', sans-serif;
      background: #f5f4f0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1rem;
    }

    .container {
      width: 100%;
      max-width: 480px;
      text-align: center;
    }

    .label {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #999;
      margin-bottom: 0.5rem;
    }

    h1 {
      font-size: 22px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 0.4rem;
    }

    .subtitle {
      font-size: 14px;
      color: #888;
      margin-bottom: 2.5rem;
    }

    .cards {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .card {
      display: flex;
      align-items: center;
      gap: 16px;
      padding: 1.1rem 1.25rem;
      background: #fff;
      border: 1px solid #e8e8e8;
      border-radius: 14px;
      text-decoration: none;
      transition: border-color 0.2s, box-shadow 0.2s, transform 0.1s;
      cursor: pointer;
    }

    .card:hover {
      box-shadow: 0 4px 16px rgba(0,0,0,0.07);
      transform: translateY(-1px);
    }

    .card:active {
      transform: translateY(0);
    }

    .card.uber:hover  { border-color: #06c167; }
    .card.demae:hover { border-color: #e63426; }
    .card.rocket:hover { border-color: #ff4c00; }

    .card-text {
      text-align: left;
      flex: 1;
    }

    .card-name {
      font-size: 16px;
      font-weight: 500;
      color: #1a1a1a;
      margin-bottom: 2px;
    }

    .card-desc {
      font-size: 13px;
      color: #888;
    }

    .arrow {
      font-size: 18px;
      color: #ccc;
      transition: color 0.2s, transform 0.2s;
    }

    .card:hover .arrow {
      color: #999;
      transform: translateX(2px);
    }

    .footer {
      font-size: 12px;
      color: #bbb;
      margin-top: 2rem;
    }
  </style>
</head>
<body>
  <div class="container">
    <p class="label">お届けサービスを選ぶ</p>
    <h1>どのサービスで注文しますか？</h1>
    <p class="subtitle">タップするとそのサービスのページへ移動します</p>

    <div class="cards">

      <a href="https://www.ubereats.com/jp" class="card uber" target="_blank" rel="noopener">
        <div class="card-text">
          <p class="card-name">Uber Eats</p>
          <p class="card-desc">レストランから自宅へ素早くお届け</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="https://demae-can.com/" class="card demae" target="_blank" rel="noopener">
        <div class="card-text">
          <p class="card-name">出前館</p>
          <p class="card-desc">全国対応・多彩なジャンルから選べる</p>
        </div>
        <span class="arrow">→</span>
      </a>

      <a href="https://rocketnow.jp/" class="card rocket" target="_blank" rel="noopener">
        <div class="card-text">
          <p class="card-name">Rocket Now</p>
          <p class="card-desc">スピード配達・今すぐ届く</p>
        </div>
        <span class="arrow">→</span>
      </a>

    </div>

    <p class="footer">タップすると各サービスの公式サイトへ移動します</p>
  </div>
</body>
</html>
